<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASPCC - Find Products</title>
<link rel="stylesheet" href="style.css">
<style>
  .search-bar { display:flex; gap:10px; margin-bottom:20px; }
  .search-bar input { flex:1; padding:10px; border-radius:8px; border:1px solid #ccc; }
  .search-bar button { padding:10px 20px; border:none; background:#0d47a1; color:white; border-radius:8px; cursor:pointer; }
</style>
</head>
<body>

<header style="background:#0d47a1;color:white;padding:15px;text-align:center">
  <h2>ASPCC Market</h2>
  <p>Aliko Dangote University, Wudil</p>
</header>

<div class="container">
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Nema: Misali, Cable, Littafi, Skirt...">
    <button id="searchBtn">Nema</button>
  </div>

  <h3>Duk Kayayyaki</h3>
  <div id="allProducts" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px">
    <!-- Products za su fito anan ta atomatik -->
  </div>
</div>

<script type="module">
import { db, collection, onSnapshot, query, orderBy } from './firebase.js';

const allProducts = document.getElementById('allProducts');
const searchInput = document.getElementById('searchInput');
const searchBtn = document.getElementById('searchBtn');
let allData = [];

// LODA DUK PRODUCTS REAL-TIME
const q = query(collection(db, "products"), orderBy("timestamp", "desc"));
onSnapshot(q, (snapshot) => {
  allData = [];
  snapshot.forEach((docSnap) => {
    allData.push(docSnap.data());
  });
  displayProducts(allData);
});

// NUNA PRODUCTS
function displayProducts(data){
  allProducts.innerHTML = '';
  if(data.length === 0){
    allProducts.innerHTML = '<p>Babu kayayyaki yanzu</p>';
    return;
  }
  data.forEach((item) => {
    const div = document.createElement('div');
    div.classList.add('product-card');
    div.innerHTML = `
      <h4>${item.item}</h4>
      <p><b>Category:</b> ${item.category}</p>
      <p><b>Shop:</b> ${item.shop}</p>
      <p><b>Price:</b> ₦${item.price}</p>
      <p><b>Location:</b> ${item.location}</p>
      <a href="tel:${item.phone}" style="display:inline-block;margin-top:8px;padding:8px 12px;background:#25D366;color:white;text-decoration:none;border-radius:5px">Call ${item.phone}</a>
    `;
    allProducts.appendChild(div);
  });
}

// SEARCH
searchBtn.addEventListener('click', () => {
  const term = searchInput.value.toLowerCase();
  const filtered = allData.filter(p => 
    p.item.toLowerCase().includes(term) || 
    p.category.toLowerCase().includes(term) ||
    p.shop.toLowerCase().includes(term)
  );
  displayProducts(filtered);
});

</script>

</body>
</html>
